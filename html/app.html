<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Pace Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="../styles/styles.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="../index.html">Parker Morgan</a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="../index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="resume.html">Resume</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="scratch.html">Half Marathon</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="app.html">Web App</a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-3">Running Pace Calculator</h1>

    <p class="text-center text-muted">
        Enter a distance and finishing time to calculate pace and project race times.
    </p>

    <div class="card shadow p-4">

        <div class="mb-3">
            <label for="distance" class="form-label">
                Distance (miles)
            </label>

            <input type="number"
                   id="distance"
                   class="form-control"
                   placeholder="13.1"
                   step="0.01">
        </div>

        <div class="row">

            <div class="col-md-4 mb-3">
                <label for="hours" class="form-label">
                    Hours
                </label>

                <input type="number"
                       id="hours"
                       class="form-control"
                       placeholder="1">
            </div>

            <div class="col-md-4 mb-3">
                <label for="minutes" class="form-label">
                    Minutes
                </label>

                <input type="number"
                       id="minutes"
                       class="form-control"
                       placeholder="27">
            </div>

            <div class="col-md-4 mb-3">
                <label for="seconds" class="form-label">
                    Seconds
                </label>

                <input type="number"
                       id="seconds"
                       class="form-control"
                       placeholder="24">
            </div>

        </div>

        <button class="btn btn-primary btn-lg"
                onclick="calculatePace()">
            Calculate
        </button>

        <div id="results" class="mt-4"></div>

    </div>

</div>

<footer class="footer mt-5">
    <p>&copy; 2026 Parker Morgan</p>
</footer>

<script>

    function formatTime(totalSeconds) {

        let hours = Math.floor(totalSeconds / 3600);
        let minutes = Math.floor((totalSeconds % 3600) / 60);
        let seconds = Math.round(totalSeconds % 60);

        if (seconds === 60) {
            seconds = 0;
            minutes++;
        }

        if (minutes === 60) {
            minutes = 0;
            hours++;
        }

        return (
            hours +
            ":" +
            String(minutes).padStart(2, "0") +
            ":" +
            String(seconds).padStart(2, "0")
        );
    }

    function calculatePace() {

        let distance =
            parseFloat(document.getElementById("distance").value);

        let hours =
            parseFloat(document.getElementById("hours").value) || 0;

        let minutes =
            parseFloat(document.getElementById("minutes").value) || 0;

        let seconds =
            parseFloat(document.getElementById("seconds").value) || 0;

        if (!distance || distance <= 0) {

            document.getElementById("results").innerHTML =
                "<div class='alert alert-danger'>Please enter a valid distance.</div>";

            return;
        }

        let totalSeconds =
            (hours * 3600) +
            (minutes * 60) +
            seconds;

        if (totalSeconds <= 0) {

            document.getElementById("results").innerHTML =
                "<div class='alert alert-danger'>Please enter a valid finishing time.</div>";

            return;
        }

        let pacePerMile = totalSeconds / distance;

        let paceMinutes = Math.floor(pacePerMile / 60);
        let paceSeconds = Math.round(pacePerMile % 60);

        if (paceSeconds === 60) {
            paceSeconds = 0;
            paceMinutes++;
        }

        let kmDistance = distance * 1.60934;
        let pacePerKm = totalSeconds / kmDistance;

        let kmMinutes = Math.floor(pacePerKm / 60);
        let kmSeconds = Math.round(pacePerKm % 60);

        if (kmSeconds === 60) {
            kmSeconds = 0;
            kmMinutes++;
        }

        let race5k = pacePerMile * 3.10686;
        let race10k = pacePerMile * 6.21371;
        let raceHalf = pacePerMile * 13.1;
        let raceMarathon = pacePerMile * 26.2;

        document.getElementById("results").innerHTML =

            "<div class='alert alert-success'>" +

            "<h4>Results</h4>" +

            "<p><strong>Pace per Mile:</strong> " +
            paceMinutes + ":" +
            String(paceSeconds).padStart(2, "0") +
            "</p>" +

            "<p><strong>Pace per Kilometer:</strong> " +
            kmMinutes + ":" +
            String(kmSeconds).padStart(2, "0") +
            "</p>" +

            "<hr>" +

            "<h5>Projected Race Times</h5>" +

            "<p><strong>5K:</strong> " +
            formatTime(race5k) +
            "</p>" +

            "<p><strong>10K:</strong> " +
            formatTime(race10k) +
            "</p>" +

            "<p><strong>Half Marathon:</strong> " +
            formatTime(raceHalf) +
            "</p>" +

            "<p><strong>Marathon:</strong> " +
            formatTime(raceMarathon) +
            "</p>" +

            "</div>";
    }

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
